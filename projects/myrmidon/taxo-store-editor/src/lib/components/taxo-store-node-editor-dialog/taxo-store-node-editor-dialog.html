<h2 mat-dialog-title>{{ isNew ? 'New Node' : 'Edit Node' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form">
    <mat-form-field>
      <input matInput [formControl]="key" placeholder="key" />
      @if (key.hasError('required')) {
        <mat-error>Key is required</mat-error>
      }
    </mat-form-field>

    <mat-form-field>
      <input matInput [formControl]="label" placeholder="label" />
      @if (label.hasError('required')) {
        <mat-error>Label is required</mat-error>
      }
    </mat-form-field>

    <mat-form-field>
      <input matInput [formControl]="filteredLabel" placeholder="filtered label (optional)" />
      <mat-hint>Used for search; defaults to label if empty</mat-hint>
    </mat-form-field>

    <mat-form-field>
      <input matInput [formControl]="flags" placeholder="flags (optional)" />
      <mat-hint>Single characters for categorization</mat-hint>
    </mat-form-field>

    <mat-form-field>
      <textarea matInput [formControl]="note" placeholder="note (optional)" rows="3"></textarea>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button type="button" mat-button (click)="cancel()">Cancel</button>
  <button type="button" mat-flat-button color="primary" [disabled]="form.invalid" (click)="save()">
    {{ isNew ? 'Create' : 'Save' }}
  </button>
</mat-dialog-actions>
